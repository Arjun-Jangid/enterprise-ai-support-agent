services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: enterprise-backend-container

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: enterprise-frontend-container

    ports:
      - "8501:8501"

    env_file:
      - .env

    volumes:
      - ./frontend:/app/frontend
